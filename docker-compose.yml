services:
  postgres:
    image: postgres:16-alpine
    container_name: smdp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smdp_bahteramas
    ports:
      - "5433:5432"
    volumes:
      - smdp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smdp_bahteramas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smdp_postgres_data:
